# =====================================================================================
#  MagicHID UART wire protocol -- SINGLE SOURCE OF TRUTH
# =====================================================================================
#  Humans edit this file. `tools/gen_protocol.py` derives, so nothing drifts:
#    - magichid/mh_protocol_defs.h            (C constants, for the firmware)
#    - spec/protocol_vectors.txt              (golden conformance vectors)
#  The human-readable spec is spec/PROTOCOL.md. Any client in any language can be built
#  from PROTOCOL.md + this file + the vectors (a client lives in its own repo).
# =====================================================================================

meta:
  name: MagicHID
  proto_version: 2        # v2: CAPS entries gained a [flags] byte (bit0 = RELATIVE)

# ---- framing -------------------------------------------------------------------------
# Wire frame:  COBS( [TYPE:1][SEQ:1][PAYLOAD:0..N][CRC16:2 LE] )  +  delimiter(0x00)
# CRC16 covers TYPE..PAYLOAD (not the CRC bytes). COBS removes all 0x00 from the body so
# the 0x00 delimiter is unambiguous.
framing:
  delimiter: 0x00
  cobs: true
  crc:
    name: CRC16-CCITT
    width: 16
    poly: 0x1021
    init: 0xFFFF
    reflect_in: false
    reflect_out: false
    xorout: 0x0000
    byte_order: little

# ---- limits --------------------------------------------------------------------------
limits:
  max_payload: 192        # logical payload max (the CAPS reply is ~140 bytes)
  hid_max_payload: 63     # CFG_TUD_HID_EP_BUFSIZE(64) - 1 report-id byte
  dedup_window: 16        # SEQ idempotency window: the device remembers the last N applied
                          # SEQs and re-ACKs (never re-applies) duplicates. See PROTOCOL.md
                          # "Reliability". It is a sliding window between two walls: N must
                          # exceed a client's max un-ACKed burst (else a late retransmit is
                          # forgotten and re-applied) yet stay well below 255 (else a SEQ
                          # reused after a wrap is mistaken for a duplicate; 255 == the wrap
                          # point itself). 16 sits far from both on a 1 Mbps link.

# ---- message types -------------------------------------------------------------------
# dir: c2d = operator PC -> device,  d2c = device -> operator PC
messages:
  - { name: SEND_REPORT,  code: 0x01, dir: c2d, payload: "[report_id][hid data...]" }
  - { name: PING,         code: 0x02, dir: c2d, payload: "[]" }
  - { name: RELEASE_ALL,  code: 0x03, dir: c2d, payload: "[]" }
  - { name: GET_CAPS,     code: 0x04, dir: c2d, payload: "[]" }
  - { name: SET_IDENTITY, code: 0x05, dir: c2d, payload: "[vid:2][pid:2][bcd:2][profile:1]" }
  - { name: SET_FEATURE,  code: 0x06, dir: c2d, payload: "[report_id][data...]" }
  - { name: STATUS,       code: 0x81, dir: d2c, payload: "[flags:1][proto_version:1]" }
  - { name: ACK,          code: 0x82, dir: d2c, payload: "[seq:1]" }
  - { name: NACK,         code: 0x83, dir: d2c, payload: "[seq:1][reason:1]" }
  - { name: HOST_EVENT,   code: 0x84, dir: d2c, payload: "[report_id][report_type:1][data...]" }
  - { name: LOG,          code: 0x85, dir: d2c, payload: "[ascii...]" }
  - { name: CAPS,         code: 0x86, dir: d2c, payload: "N x [id][in_len][out_len][feat_len][flags]" }

# ---- STATUS flag bits ----------------------------------------------------------------
status_flags:
  MOUNTED:   0x01   # enumerated by the target host
  SUSPENDED: 0x02   # USB suspended
  READY:     0x04   # HID IN endpoint ready to accept a report
  WATCHDOG:  0x08   # a watchdog auto-release just happened

# ---- NACK reasons --------------------------------------------------------------------
nack_reasons:
  BAD_CRC:      1
  BAD_LEN:      2
  UNKNOWN_ID:   3
  NOT_READY:    4
  NOT_SENDABLE: 5   # report has no INPUT (output/feature-only)
  BAD_FRAME:    6
  TOO_BIG:      7   # report exceeds the 63-byte HID payload limit

# ---- HID report types (USB HID spec; used in HOST_EVENT) -----------------------------
hid_report_types:
  INPUT:   1
  OUTPUT:  2
  FEATURE: 3

# ---- report flags (the [flags] byte of each CAPS entry / reports.json "relative") -----
report_flags:
  RELATIVE: 0x01   # the report's INPUT contains a relative field (e.g. mouse move/wheel);
                   # a client MUST drive it in reliable mode (see PROTOCOL.md "Reliability")
